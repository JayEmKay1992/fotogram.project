<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram</title>
    <link rel="icon" type="image/png" href="./img/fotogram-icon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="home">
    <a href="#gallery" class="skip-link">Zum Inhalt springen</a>

    <header id="top">
      <div class="header-content">
        <a
          href="#home"
          class="header-back-link"
          aria-label="Zurück zum Seitenanfang"
        >
          <img src="./img/fotogram-icon.png" alt="Fotogram Logo" />
          <h1>Fotogram</h1>
        </a>
      </div>
    </header>

    <main id="gallery" class="gallery">
      <h2>Your personal photo album</h2>
      <div id="photo-grid" class="photo-grid"></div>
    </main>

    <footer>
      <p>&copy; 2026 Johanna Kohlberger</p>
    </footer>

    <dialog
      id="photo-modal"
      class="modal"
    >
      <div class="modal-frame">
        <div class="modal-main-content">
          <div class="modal-header-bar">
            <h3 id="modal-caption">Fotodetails</h3>
            <!-- Das Modal erhält einen beschreibenden Titel, um Screenreadern und assistiven Technologien Kontext zu bieten. -->
            <button class="close-modal" aria-label="Modal schließen">
              <svg
                viewBox="0 0 24 24"
                width="24"
                height="24"
                stroke="currentColor"
                stroke-width="2"
                fill="none"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>

          <div class="modal-image-container">
            <img id="modal-img" src="" alt="" />
          </div>
        </div>

        <div class="modal-controls">
          <button
            id="prev-photo"
            class="control-btn"
            aria-label="Vorheriges Bild"
          >
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>

          <button id="like-btn" class="like-btn" aria-label="Gefällt mir">
            <svg
              class="heart-icon"
              id="heart-icon"
              viewBox="0 0 24 24"
              width="24"
              height="24"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M20.8 4.6c-1.5-1.4-3.6-1.4-5.1 0L12 8.3l-3.7-3.7c-1.5-1.4-3.6-1.4-5.1 0s-1.5 3.6 0 5l8.8 8.9 8.8-8.9c1.5-1.4 1.5-3.6 0-5z"
              ></path>
            </svg>
          </button>

          <span id="photo-counter" class="photo-counter"></span>
          <button
            id="next-photo"
            class="control-btn"
            aria-label="Nächstes Bild"
          >
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
